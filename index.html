<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudentHub Pro</title>
<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginPage" class="center">
  <h2>🎓 StudentHub Login</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

<div class="sidebar">
  <h2>🎓 StudentHub</h2>
  <p>Dashboard</p>
  <p>Students</p>
</div>

<div class="main">

  <div class="topbar">
    <input id="search" placeholder="Search..." onkeyup="displayStudents()">
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="exportPDF()">📄 Export</button>
  </div>

  <div class="stats">
    <div class="stat-card" id="total"></div>
    <div class="stat-card" id="top"></div>
    <div class="stat-card" id="avg"></div>
  </div>

  <canvas id="chart"></canvas>

  <h3>🏆 Leaderboard</h3>
  <div id="leaderboard" class="cards"></div>

  <div class="form">
    <input id="name" placeholder="Name">
    <input id="roll" placeholder="Roll">
    <input id="marks" placeholder="Marks">
    <input id="attendance" placeholder="Attendance %">
    <button onclick="addStudent()">Add</button>
  </div>

  <div id="list" class="cards"></div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
